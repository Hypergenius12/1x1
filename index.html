<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1x1 Rubik's Cube Solver</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Three.js and TrackballControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h1>1x1 Cube Solver</h1>
        
        <div class="controls-group">
            <button id="btn-scramble">Scramble</button>
            <button id="btn-reset">Reset</button>
        </div>
        
        <div class="solver-group">
            <label for="solve-method">Method:</label>
            <select id="solve-method">
                <option value="optimal">Optimal (Shortest Path)</option>
            </select>
            <button id="btn-solve" class="primary-btn">Solve Cube</button>
        </div>

        <div class="settings-group">
            <details>
                <summary>Settings</summary>
                <div class="settings-content">
                    <label>
                        Animation Speed:
                        <select id="setting-speed">
                            <option value="slow">Slow</option>
                            <option value="normal" selected>Normal</option>
                            <option value="fast">Fast</option>
                            <option value="instant">Instant</option>
                        </select>
                    </label>
                    <label>
                        Cube Colors:
                        <select id="setting-colors">
                            <option value="standard" selected>Standard</option>
                            <option value="pastel">Pastel</option>
                            <option value="neon">Neon</option>
                        </select>
                    </label>
                    <label>
                        Camera:
                        <select id="setting-camera">
                            <option value="perspective" selected>Perspective</option>
                            <option value="orthographic">Orthographic</option>
                            <option value="isometric">Isometric (Snap)</option>
                        </select>
                    </label>
                    <label>
                        Style:
                        <select id="setting-style">
                            <option value="block" selected>Block</option>
                            <option value="floating">Floating</option>
                            <option value="wireframe">Wireframe</option>
                        </select>
                    </label>
                </div>
            </details>
        </div>

        <div id="solution-output" class="hidden">
            <h3>Solution (<span id="solution-length">0</span> moves)</h3>
            <p id="solution-text"></p>
            <div class="playback-controls">
                <button id="btn-prev">←</button>
                <button id="btn-play">Play</button>
                <button id="btn-next">→</button>
            </div>
        </div>
        
        <div class="manual-controls">
            <p>Controls: Drag outside cube to rotate camera. Drag the cube to turn it.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/cube3d.js"></script>
    <script src="js/main.js"></script>
    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/tracker.js"></script>
</body>
</html>
